name: CD Demo
on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4

        with:
          name: app-build

      - name: Simular deploy
        run: echo "Deploy Realizado com Sucesso!"


  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4

        with:
          node-version: 24

      - name: Instalar Dependências
        run: npm install

      - name: Rodar Testes
        run: npm test

  deploy:

    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Simular Deploy
        run: echo "Deploy Realizado com Sucesso!"