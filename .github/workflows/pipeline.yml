name: CD Demo
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4

        with:
          node-version: 24

      - name: Instalar Dependências
        run: npm install

      - name: Rodar Testes
        run: npm test